<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --clay: #B85C38;
  --clay-dark: #8B3A1F;
  --clay-light: #D4845A;
  --sand: #F5E6D3;
  --sand-light: #FBF4EC;
  --sand-dark: #E8D5BD;
  --charcoal: #2C2420;
  --charcoal-70: rgba(44,36,32,.7);
  --warm-gray: #6B5E57;
  --cream: #FFFAF5;
  --sage: #7A8B6F;
  --sage-light: #E8EDE5;
  --terracotta: #C75B39;
  --gold: #C9A84C;
  --heading: 'DM Serif Display', Georgia, serif;
  --body: 'Source Sans 3', 'Segoe UI', sans-serif;
  --gap: 1.5rem;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 2px 8px rgba(44,36,32,.06);
  --shadow-md: 0 4px 20px rgba(44,36,32,.10);
  --shadow-lg: 0 8px 40px rgba(44,36,32,.14);
  --ease: cubic-bezier(.4,0,.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family: var(--body);
  color: var(--charcoal);
  background: var(--cream);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:1rem}
h1,h2,h3,h4{font-family: var(--heading);font-weight:400;line-height:1.2}

.container{max-width:1200px;margin:0 auto;padding:0 1.25rem}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.page{display:none;animation:fadeUp .45s var(--ease) both}
.page.active{display:block}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

/* NAVBAR */
.navbar{
  position:sticky;top:0;z-index:100;
  background:rgba(255,250,245,.88);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--sand-dark);
  transition:box-shadow .3s var(--ease);
}
.navbar.scrolled{box-shadow: var(--shadow-sm)}
.navbar .container{
  display:flex;align-items:center;justify-content:space-between;
  height:68px;
}
.nav-brand{
  font-family: var(--heading);font-size:1.55rem;color: var(--clay);
  letter-spacing:-.02em;
}
.nav-brand span{color: var(--charcoal)}
.nav-links{display:flex;align-items:center;gap:1.8rem}
.nav-links a{
  font-size:.92rem;font-weight:500;color: var(--warm-gray);
  position:relative;transition:color .25s var(--ease);
}
.nav-links a:hover,.nav-links a.active{color: var(--clay)}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;
  background: var(--clay);border-radius:2px;transition:width .3s var(--ease);
}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}

.cart-link{position:relative;display:flex;align-items:center;gap:.4rem}
.cart-badge{
  position:absolute;top:-8px;right:-12px;
  background: var(--terracotta);color:#fff;font-size:.7rem;font-weight:700;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transform:scale(0);transition:transform .3s var(--ease);
}
.cart-badge.show{transform:scale(1)}
.cart-icon{width:22px;height:22px}

.nav-toggle{display:none;flex-direction:column;gap:5px;padding:4px}
.nav-toggle span{width:22px;height:2px;background: var(--charcoal);border-radius:2px;transition:all .3s var(--ease)}

@media(max-width:768px){
  .nav-toggle{display:flex}
  .nav-links{
    position:fixed;top:68px;left:0;right:0;
    background: var(--cream);
    flex-direction:column;padding:1.5rem;gap:1.2rem;
    border-bottom:1px solid var(--sand-dark);
    transform:translateY(-110%);opacity:0;
    transition:all .35s var(--ease);
  }
  .nav-links.open{transform:translateY(0);opacity:1}
  .nav-links a{font-size:1.05rem}
}

/* HERO */
.hero{
  background:linear-gradient(135deg, var(--sand) 0%, var(--sand-light) 40%,#FDF6EE 100%);
  padding:5rem 0 4.5rem;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-60%;right:-15%;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(184,92,56,.08) 0%,transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;bottom:-30%;left:-10%;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 70%);
  pointer-events:none;
}
.hero-inner{display:flex;align-items:center;gap:3rem}
.hero-text{flex:1;position:relative;z-index:1}
.hero-text h1{
  font-size:clamp(2.4rem,5vw,3.6rem);
  color: var(--charcoal);margin-bottom:.8rem;
}
.hero-text h1 em{color: var(--clay);font-style:italic}
.hero-tagline{
  font-size:1.15rem;color: var(--warm-gray);max-width:480px;
  margin-bottom:2rem;line-height:1.7;
}
.hero-cta{
  display:inline-flex;align-items:center;gap:.5rem;
  background: var(--clay);color:#fff;
  padding:.85rem 2rem;border-radius: var(--radius);
  font-weight:600;font-size:.95rem;
  transition:all .3s var(--ease);
  box-shadow:0 4px 16px rgba(184,92,56,.25);
}
.hero-cta:hover{
  background: var(--clay-dark);
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(184,92,56,.3);
}
.hero-visual{
  flex:0 0 340px;position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
}
.hero-shape{
  width:280px;height:280px;border-radius:50%;
  background:linear-gradient(145deg, var(--clay-light), var(--clay));
  opacity:.12;position:absolute;
}
.hero-shape-2{
  width:200px;height:200px;border-radius:50%;
  background:linear-gradient(145deg, var(--gold), var(--sage));
  opacity:.1;position:absolute;top:40px;left:80px;
}
@media(max-width:768px){
  .hero{padding:3rem 0 2.5rem}
  .hero-visual{display:none}
}

/* FILTER */
.filter-bar{
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
  padding:2.5rem 0 1.2rem;
}
.filter-btn{
  padding:.5rem 1.2rem;border-radius:50px;
  font-size:.85rem;font-weight:500;color: var(--warm-gray);
  border:1.5px solid var(--sand-dark);
  background:transparent;
  transition:all .25s var(--ease);
}
.filter-btn:hover{border-color: var(--clay-light);color: var(--clay)}
.filter-btn.active{
  background: var(--clay);color:#fff;border-color: var(--clay);
}

/* PRODUCT GRID */
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap: var(--gap);
  padding-bottom:4rem;
}

/* PRODUCT CARD */
.product-card{
  background:#fff;border-radius: var(--radius);
  overflow:hidden;
  box-shadow: var(--shadow-sm);
  transition:all .35s var(--ease);
  display:flex;flex-direction:column;
  cursor:pointer;position:relative;
}
.product-card:hover{
  transform:translateY(-6px);
  box-shadow: var(--shadow-lg);
}
.card-img-wrap{
  position:relative;overflow:hidden;
  aspect-ratio:4/3;background: var(--sand-light);
  display:flex;align-items:center;justify-content:center;
}
.card-img-wrap img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .5s var(--ease);
}
.product-card:hover .card-img-wrap img{transform:scale(1.06)}
.card-img-placeholder{font-size:3rem;color: var(--sand-dark)}
.card-category{
  position:absolute;top:.75rem;left:.75rem;
  background:rgba(255,250,245,.9);backdrop-filter:blur(6px);
  padding:.25rem .7rem;border-radius:50px;
  font-size:.72rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color: var(--warm-gray);
}
.out-of-stock-badge{
  position:absolute;top:.75rem;right:.75rem;
  background:rgba(44,36,32,.8);color:#fff;
  padding:.25rem .7rem;border-radius:50px;
  font-size:.72rem;font-weight:600;
}
.card-body{
  padding:1.2rem 1.2rem 1rem;flex:1;display:flex;flex-direction:column;
}
.card-body h3{
  font-size:1.12rem;margin-bottom:.35rem;
  transition:color .2s var(--ease);
}
.product-card:hover .card-body h3{color: var(--clay)}
.card-desc{
  font-size:.84rem;color: var(--warm-gray);
  margin-bottom:.8rem;flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.2rem 1.2rem;
}
.card-price{
  font-family: var(--heading);font-size:1.25rem;color: var(--charcoal);
}
.btn-add-cart{
  padding:.55rem 1.1rem;border-radius: var(--radius-sm);
  font-size:.82rem;font-weight:600;
  background: var(--clay);color:#fff;
  transition:all .25s var(--ease);
  white-space:nowrap;position:relative;z-index:2;
}
.btn-add-cart:hover{background: var(--clay-dark)}
.btn-add-cart.in-cart{background: var(--sage);pointer-events:none}
.btn-add-cart:disabled{background: var(--sand-dark);color: var(--warm-gray);cursor:not-allowed}

/* PRODUCT DETAIL */
.product-detail{max-width:1100px;margin:0 auto;padding:2rem 1.25rem 4rem}
.back-link{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.9rem;color: var(--warm-gray);margin-bottom:1.5rem;
  transition:color .2s;
}
.back-link:hover{color: var(--clay)}
.pd-layout{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
@media(max-width:768px){.pd-layout{grid-template-columns:1fr;gap:1.5rem}}

.pd-gallery{position:relative}
.pd-main-img{
  width:100%;aspect-ratio:1;border-radius: var(--radius);overflow:hidden;
  background: var(--sand-light);display:flex;align-items:center;justify-content:center;
  margin-bottom:.8rem;
}
.pd-main-img img{width:100%;height:100%;object-fit:cover}
.pd-thumbs{display:flex;gap:.5rem}
.pd-thumb{
  width:72px;height:72px;border-radius: var(--radius-sm);overflow:hidden;
  border:2px solid transparent;cursor:pointer;
  transition:border-color .2s var(--ease);
  background: var(--sand-light);
}
.pd-thumb.active,.pd-thumb:hover{border-color: var(--clay)}
.pd-thumb img{width:100%;height:100%;object-fit:cover}

.pd-info h1{font-size:2rem;margin-bottom:.3rem}
.pd-category{
  font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;
  color: var(--warm-gray);font-weight:600;margin-bottom:1rem;
}
.pd-price{
  font-family: var(--heading);font-size:1.8rem;color: var(--clay);
  margin-bottom:1rem;
}
.pd-desc{color: var(--warm-gray);margin-bottom:1.5rem;line-height:1.8}
.pd-stock{font-size:.85rem;margin-bottom:1.5rem}
.pd-stock.low{color: var(--terracotta)}
.pd-stock.ok{color: var(--sage)}

.qty-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.qty-control{
  display:flex;align-items:center;border:1.5px solid var(--sand-dark);
  border-radius: var(--radius-sm);overflow:hidden;
}
.qty-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color: var(--charcoal);transition:background .2s;
}
.qty-btn:hover{background: var(--sand)}
.qty-val{
  width:48px;text-align:center;font-weight:600;font-size:1rem;
  border:none;background:transparent;
  -moz-appearance:textfield;
}
.qty-val::-webkit-outer-spin-button,.qty-val::-webkit-inner-spin-button{-webkit-appearance:none}

.btn-add-detail{
  padding:.75rem 2.2rem;border-radius: var(--radius);
  font-size:1rem;font-weight:600;
  background: var(--clay);color:#fff;
  transition:all .3s var(--ease);
  box-shadow:0 4px 16px rgba(184,92,56,.2);
}
.btn-add-detail:hover{background: var(--clay-dark);transform:translateY(-2px)}
.btn-add-detail.in-cart{background: var(--sage)}
.btn-add-detail:disabled{background: var(--sand-dark);color: var(--warm-gray);cursor:not-allowed;box-shadow:none}

.related-section{margin-top:4rem}
.related-section h2{font-size:1.5rem;margin-bottom:1.5rem}
.related-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap: var(--gap);
}

/* CART PAGE */
.cart-page{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem}
.cart-page h1{font-size:2rem;margin-bottom:1.5rem}
.cart-empty{text-align:center;padding:4rem 1rem;color: var(--warm-gray)}
.cart-empty svg{width:64px;height:64px;margin-bottom:1rem;opacity:.3}
.cart-empty p{margin-bottom:1.2rem}

.cart-item{
  display:flex;gap:1.2rem;align-items:center;
  padding:1.2rem 0;border-bottom:1px solid var(--sand-dark);
}
.cart-item-img{
  width:90px;height:90px;border-radius: var(--radius-sm);overflow:hidden;
  background: var(--sand-light);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-info h3{font-size:1rem;margin-bottom:.2rem}
.cart-item-info .ci-price{color: var(--clay);font-weight:600}
.cart-item-actions{display:flex;align-items:center;gap:1rem}
.cart-item-actions .qty-control{border-color: var(--sand-dark)}
.btn-remove{font-size:.82rem;color: var(--terracotta);font-weight:500;transition:opacity .2s}
.btn-remove:hover{opacity:.7}
.cart-item-total{font-family: var(--heading);font-size:1.1rem;min-width:80px;text-align:right}

@media(max-width:600px){
  .cart-item{flex-wrap:wrap}
  .cart-item-total{min-width:auto;text-align:left;width:100%;padding-top:.3rem}
}

.cart-summary{
  margin-top:1.5rem;padding:1.5rem;
  background: var(--sand-light);border-radius: var(--radius);
}
.cart-summary-row{
  display:flex;justify-content:space-between;margin-bottom:.5rem;
  font-size:.95rem;color: var(--warm-gray);
}
.cart-summary-row.total{
  font-family: var(--heading);font-size:1.4rem;color: var(--charcoal);
  margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--sand-dark);
}
.btn-checkout{
  display:block;width:100%;margin-top:1.2rem;
  padding:.85rem;border-radius: var(--radius);
  background: var(--clay);color:#fff;font-weight:600;font-size:1rem;
  transition:all .3s var(--ease);text-align:center;
}
.btn-checkout:hover{background: var(--clay-dark)}

/* CHECKOUT */
.checkout-page{max-width:960px;margin:0 auto;padding:2rem 1.25rem 4rem}
.checkout-page h1{font-size:2rem;margin-bottom:1.5rem}
.checkout-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:2.5rem;align-items:start}
@media(max-width:768px){.checkout-grid{grid-template-columns:1fr}}

.form-group{margin-bottom:1.2rem}
.form-group label{
  display:block;font-size:.85rem;font-weight:600;
  margin-bottom:.35rem;color: var(--charcoal);
}
.form-group input,.form-group textarea{
  width:100%;padding:.7rem .9rem;border-radius: var(--radius-sm);
  border:1.5px solid var(--sand-dark);background:#fff;
  transition:border-color .25s var(--ease);
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color: var(--clay)}
.form-group textarea{resize:vertical;min-height:80px}

.order-summary{
  background: var(--sand-light);border-radius: var(--radius);padding:1.5rem;
  position:sticky;top:88px;
}
.order-summary h2{font-size:1.2rem;margin-bottom:1rem}
.os-item{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.9rem;padding:.4rem 0;
}
.os-item .os-name{color: var(--warm-gray)}
.os-total{
  display:flex;justify-content:space-between;
  font-family: var(--heading);font-size:1.3rem;
  margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--sand-dark);
}

.btn-place-order{
  display:block;width:100%;margin-top:1.4rem;
  padding:.85rem;border-radius: var(--radius);
  background: var(--clay);color:#fff;font-weight:600;font-size:1rem;
  transition:all .3s var(--ease);
}
.btn-place-order:hover{background: var(--clay-dark)}
.btn-place-order:disabled{background: var(--sand-dark);color: var(--warm-gray);cursor:not-allowed}

.checkout-success{text-align:center;padding:4rem 1rem}
.checkout-success svg{width:72px;height:72px;color: var(--sage);margin-bottom:1rem}
.checkout-success h2{font-size:1.8rem;margin-bottom:.5rem}
.checkout-success p{color: var(--warm-gray)}

/* FOOTER */
.site-footer{
  background: var(--charcoal);color:rgba(255,250,245,.5);
  padding:2.5rem 0;text-align:center;font-size:.85rem;
}
.site-footer strong{color: var(--clay-light);font-family: var(--heading);font-weight:400}

/* TOAST */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;
  background: var(--charcoal);color:#fff;
  padding:.8rem 1.4rem;border-radius: var(--radius-sm);
  font-size:.9rem;font-weight:500;
  transform:translateY(100px);opacity:0;
  transition:all .35s var(--ease);
  box-shadow: var(--shadow-lg);
}
.toast.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background: var(--sand-light)}
::-webkit-scrollbar-thumb{background: var(--sand-dark);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background: var(--clay-light)}
</style>
</head>
<body>

      <span></span><span></span><span></span>

</nav>

<main>

  <div id="page-product" class="page"></div>

  <div id="page-checkout" class="page"></div>
</main>

<footer class="site-footer">
  <div class="container">
    <p>&copy; 2026 <strong id="footerBrand"></strong>. Crafted with care.</p>
  </div>
</footer>

<div class="toast" id="toast"></div>

/* ==============================================================
   CART (localStorage)
   ============================================================== */
var CART_KEY = 'neo_cart';

function getCart() {
  try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
  catch(e) { return []; }
}
function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }
function clearCart() { localStorage.removeItem(CART_KEY); updateCartBadge(); }

function addToCart(productId, qty) {
  qty = qty || 1;
  var cart = getCart();
  var existing = null;
  var product = null;
  for (var i = 0; i < cart.length; i++) { if (cart[i].id === productId) existing = cart[i]; }
  for (var i = 0; i < PRODUCTS.length; i++) { if (PRODUCTS[i].id === productId) product = PRODUCTS[i]; }
  if (!product || product.stock === 0) return;
  if (existing) {
    existing.qty = Math.min(existing.qty + qty, product.stock);
  } else {
    cart.push({ id: productId, qty: Math.min(qty, product.stock) });
  }
  saveCart(cart);
  updateCartBadge();
  showToast('Added to cart');
}

function removeFromCart(productId) {
  var cart = getCart();
  var filtered = [];
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id !== productId) filtered.push(cart[i]);
  }
  saveCart(filtered);
  updateCartBadge();
}

function updateQty(productId, qty) {
  var cart = getCart();
  var item = null;
  var product = null;
  for (var i = 0; i < cart.length; i++) { if (cart[i].id === productId) item = cart[i]; }
  for (var i = 0; i < PRODUCTS.length; i++) { if (PRODUCTS[i].id === productId) product = PRODUCTS[i]; }
  if (!item || !product) return;
  item.qty = Math.max(1, Math.min(qty, product.stock));
  saveCart(cart);
  updateCartBadge();
}

function findProduct(id) {
  for (var i = 0; i < PRODUCTS.length; i++) { if (PRODUCTS[i].id === id) return PRODUCTS[i]; }
  return null;
}

function isInCart(productId) {
  var cart = getCart();
  for (var i = 0; i < cart.length; i++) { if (cart[i].id === productId) return true; }
  return false;
}

function cartTotal() {
  var cart = getCart();
  var sum = 0;
  for (var i = 0; i < cart.length; i++) {
    var p = findProduct(cart[i].id);
    if (p) sum += p.price * cart[i].qty;
  }
  return sum;
}

function cartCount() {
  var cart = getCart();
  var s = 0;
  for (var i = 0; i < cart.length; i++) s += cart[i].qty;
  return s;
}

function updateCartBadge() {
  var badge = document.getElementById('cartBadge');
  var c = cartCount();
  badge.textContent = c;
  if (c > 0) badge.classList.add('show'); else badge.classList.remove('show');
}

/* ==============================================================
   TOAST
   ============================================================== */
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

/* ==============================================================
   ROUTING
   ============================================================== */
function getRoute() {
  var hash = location.hash.slice(1) || 'home';
  var parts = hash.split('/');
  return { page: parts[0], param: parts.slice(1).join('/') };
}

function navigate(hash) { location.hash = hash; }

function renderRoute() {
  var route = getRoute();
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById('navLinks').classList.remove('open');
  var navs = document.querySelectorAll('[data-nav]');
  for (var i = 0; i < navs.length; i++) {
    if (navs[i].dataset.nav === route.page) navs[i].classList.add('active');
    else navs[i].classList.remove('active');
  }

  switch (route.page) {
    case 'product': renderProductPage(parseInt(route.param)); break;
    case 'cart':    renderCartPage(); break;
    case 'checkout':renderCheckoutPage(); break;
    default:        renderHomePage(); break;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('hashchange', renderRoute);

function renderProductGrid(category) {
  var grid = document.getElementById('productGrid');
  var items = [];
  for (var i = 0; i < PRODUCTS.length; i++) {
    if (category === 'All' || PRODUCTS[i].category === category) items.push(PRODUCTS[i]);
  }

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var p = items[i];
    var imgHtml = p.images.length
      ? '<img src="' + p.images[0] + '" alt="' + p.name + '" loading="lazy">'
      : '<span class="card-img-placeholder">&#9672;</span>';
    var oosHtml = p.stock === 0 ? '<span class="out-of-stock-badge">Sold Out</span>' : '';
    var inCart = isInCart(p.id);
    var btnHtml;
    if (p.stock > 0) {
      btnHtml = '<button class="btn-add-cart' + (inCart ? ' in-cart' : '') + '" data-add="' + p.id + '">' + (inCart ? 'In Cart \u2713' : 'Add to Cart') + '</button>';
    } else {
      btnHtml = '<button class="btn-add-cart" disabled>Sold Out</button>';
    }
    html += '<div class="product-card" data-id="' + p.id + '">' +
      '<div class="card-img-wrap">' + imgHtml + '<span class="card-category">' + p.category + '</span>' + oosHtml + '</div>' +
      '<div class="card-body"><h3>' + p.name + '</h3><p class="card-desc">' + p.description + '</p></div>' +
      '<div class="card-footer"><span class="card-price">' + fmtPrice(p.price) + '</span>' + btnHtml + '</div></div>';
  }
  grid.innerHTML = html;

  var cards = grid.querySelectorAll('.product-card');
  for (var i = 0; i < cards.length; i++) {
    (function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.btn-add-cart')) return;
        navigate('product/' + card.dataset.id);
      });
    })(cards[i]);
  }

  var addBtns = grid.querySelectorAll('[data-add]');
  for (var i = 0; i < addBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = parseInt(btn.dataset.add);
        if (!isInCart(id)) {
          addToCart(id);
          btn.classList.add('in-cart');
          btn.textContent = 'In Cart \u2713';
        }
      });
    })(addBtns[i]);
  }
}

  for (var i = 0; i < plusBtns.length; i++) {

      btn.addEventListener('click', function() {
        var id = parseInt(btn.dataset.cid);
        var input = el.querySelector('.cq-input[data-cid="' + id + '"]');
        var pr = findProduct(id);
        input.value = Math.min(pr ? pr.stock : 99, +input.value + 1);
        updateQty(id, +input.value);
        renderCartPage();
      });
    })(plusBtns[i]);
  }
  var qInputs = el.querySelectorAll('.cq-input');
  for (var i = 0; i < qInputs.length; i++) {
    (function(input) {
      input.addEventListener('change', function() {
        var id = parseInt(input.dataset.cid);
        var pr = findProduct(id);
        input.value = Math.max(1, Math.min(pr ? pr.stock : 99, +input.value));
        updateQty(id, +input.value);
        renderCartPage();
      });
    })(qInputs[i]);
  }
  var removeBtns = el.querySelectorAll('.btn-remove');
  for (var i = 0; i < removeBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        removeFromCart(parseInt(btn.dataset.cid));
        renderCartPage();
      });
    })(removeBtns[i]);
  }

  el.classList.add('active');
}

  var osHtml = '';
  for (var i = 0; i < items.length; i++) {
    osHtml += '<div class="os-item"><span class="os-name">' + items[i].name + ' x ' + items[i].qty + '</span><span>' + fmtPrice(items[i].price * items[i].qty) + '</span></div>';
  }

  el.innerHTML = '<div class="checkout-page"><h1>Checkout</h1>' +
    '<div class="checkout-grid"><div>' +
      '<div id="checkoutForm">' +
        '<div class="form-group"><label for="coName">Full Name *</label><input type="text" id="coName" required placeholder="Your name"></div>' +
        '<div class="form-group"><label for="coEmail">Email *</label><input type="email" id="coEmail" required placeholder="you@email.com"></div>' +
        '<div class="form-group"><label for="coPhone">Phone *</label><input type="tel" id="coPhone" required placeholder="+91 98765 43210"></div>' +
        '<div class="form-group"><label for="coAddress">Shipping Address *</label><textarea id="coAddress" required placeholder="Full address with pincode"></textarea></div>' +
        '<div class="form-group"><label for="coNotes">Order Notes (optional)</label><textarea id="coNotes" placeholder="Any special instructions..."></textarea></div>' +
        '<button class="btn-place-order" id="btnPlaceOrder">Place Order</button>' +
      '</div>' +
      '<div class="checkout-success" id="checkoutSuccess" style="display:none">' +
        ICON_CHECK +
        '<h2>Order Placed!</h2><p>Thank you for your order. Redirecting you to the shop...</p>' +
      '</div></div>' +
      '<div class="order-summary"><h2>Order Summary</h2>' + osHtml +
        '<div class="os-total"><span>Total</span><span>' + fmtPrice(cartTotal()) + '</span></div>' +
      '</div></div></div>';

  el.querySelector('#btnPlaceOrder').addEventListener('click', function() {
    var btn = this;
    var name    = el.querySelector('#coName').value.trim();
    var email   = el.querySelector('#coEmail').value.trim();
    var phone   = el.querySelector('#coPhone').value.trim();
    var address = el.querySelector('#coAddress').value.trim();
    var notes   = el.querySelector('#coNotes').value.trim();

    if (!name || !email || !phone || !address) {
      showToast('Please fill in all required fields.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Placing order\u2026';

    var orderItems = [];
    for (var i = 0; i < items.length; i++) {
      orderItems.push({ name: items[i].name, qty: items[i].qty, price: items[i].price, total: items[i].price * items[i].qty });
    }

    var orderData = {
      name: name,
      email: email,
      phone: phone,
      address: address,
      notes: notes,
      items: orderItems,
      total: fmtPrice(cartTotal()),
      date: new Date().toISOString()
    };

    fetch(CONFIG.formspreeURL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(orderData)
    }).then(function(res) {
      if (!res.ok) throw new Error('Network error');
    }).catch(function(err) {
      console.warn('Formspree submission:', err.message);
    }).finally(function() {
      // Clear cart from localStorage
      clearCart();

      el.querySelector('#checkoutForm').style.display = 'none';
      el.querySelector('#checkoutSuccess').style.display = 'block';

      setTimeout(function() { navigate('home'); }, 3000);
    });
  });

  el.classList.add('active');
}

/* ==============================================================
   INIT
   ============================================================== */
(function init() {
  var parts = CONFIG.storeName.split(' ');
  document.getElementById('navBrand').innerHTML = '<span>' + parts[0] + '</span> ' + parts.slice(1).join(' ');
  document.getElementById('footerBrand').textContent = CONFIG.storeName;
  document.title = CONFIG.storeName;

  document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('open');
  });

  window.addEventListener('scroll', function() {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });

  updateCartBadge();
  renderRoute();
})();
</script>
</body>
</html>
